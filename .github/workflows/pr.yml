name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
  JWT_SECRET: ci-jwt-secret-that-is-at-least-32-characters-long
  ENCRYPTION_KEY: ci-encryption-key-that-is-at-least-32-characters!!
  S3_ENDPOINT: http://localhost:9000
  S3_REGION: us-east-1
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_BUCKET: clipflow-videos
  S3_FORCE_PATH_STYLE: true

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
        name: Lint

      - run: pnpm check-types
        name: Type check

      - run: pnpm build
        name: Build

      - run: pnpm --filter api test:ci
        name: API tests

      - run: pnpm --filter api test:ci
        name: API tests

      - run: pnpm --filter web test:ci
        name: Web tests

      - run: pnpm --filter @clipflow/youtube-upload test:ci
        name: YouTube upload tests
