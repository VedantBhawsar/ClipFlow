# Local-dev infrastructure for ClipFlow.
#
# Brings up everything the API + worker need to run end-to-end:
#   - Postgres 18 (Prisma data store) — image version must match the
#     server the dump was produced by. `neon_backup.sql` was produced by
#     pg_dump 18.4 and contains a `\restrict ...` directive that older
#     psql versions reject.
#   - Redis 7   (BullMQ queues)
#   - MinIO     (S3-compatible object storage, dev stand-in for R2)
#   - minio-init (creates the videos bucket on first boot)
#   - migrate    (baselines + applies pending Prisma migrations, one-shot)
#   - worker     (apps/worker in its own container — ffmpeg + node)
#   - api        (Express 4 + TypeScript)
#
# Postgres init scripts (mounted into /docker-entrypoint-initdb.d/) run
# once, on first boot of an empty data volume, in lexical order:
#   1. 00-create-neondb-owner.sql  — creates the `neondb_owner` role the
#      dump grants ownership to. Idempotent (uses IF NOT EXISTS).
#   2. neon_backup.sql             — schema + data dumped from Neon.
#
# The `migrate` service then runs once Postgres is healthy. On a fresh
# volume (schema already created by neon_backup.sql) it baselines every
# existing migration via `prisma migrate resolve --applied` so
# `prisma migrate deploy` only applies genuinely-new migrations on
# subsequent restarts. On a true fresh DB it runs `migrate deploy` from
# scratch.
#
# Usage:
#   docker compose up -d            # start (imports neon_backup.sql + migrates on first boot)
#   docker compose down -v          # stop + delete volumes (resets state; next up re-imports)
#   docker compose up -d migrate    # re-run migrations only (e.g. after adding a new migration)
#   docker compose logs -f worker   # tail worker logs (FFmpeg extraction events)
#
# To point the API at the local DB instead of Neon, swap DATABASE_URL in
# apps/api/.env to:
#   postgresql://clipflow:clipflow@localhost:5432/clipflow
#
# The worker container uses in-network hostnames (postgres / redis / minio)
# via the env file at apps/worker/.env. The container does NOT
# expose a port — it has no inbound traffic.

services:
  postgres:
    # pg 18-alpine matches the dump's source (Neon runs 18.4). 17 works too
    # if you'd rather pin to the previous major.
    image: postgres:18-alpine
    container_name: clipflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # pg 18+ images expect data under /var/lib/postgresql (the entrypoint
      # picks the version-specific subdir itself). Mounting at
      # /var/lib/postgresql/data refuses to start if the dir was created by
      # a different major version — which is exactly what we hit coming from
      # postgres:16-alpine. Wipe with `docker compose down -v` after switching.
      - pgdata:/var/lib/postgresql
      # Init scripts run only on the first boot of an empty volume.
      # Order is lexical: the role-creation script MUST come before
      # neon_backup.sql, otherwise the dump's `ALTER ... OWNER TO
      # neondb_owner` statements fail.
      - ./docker/postgres/init/00-create-neondb-owner.sql:/docker-entrypoint-initdb.d/00-create-neondb-owner.sql:ro
      - ./neon_backup.sql:/docker-entrypoint-initdb.d/10-neon_backup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clipflow

  redis:
    image: redis:7-alpine
    container_name: clipflow-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clipflow

  minio:
    image: minio/minio:latest
    container_name: clipflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (login minioadmin/minioadmin)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clipflow

  # One-shot init container: create the videos bucket on first boot.
  # `minio mb` is idempotent when wrapped in `|| true`, so it's safe
  # to re-run via `docker compose up` after `down` without `-v`.
  minio-init:
    image: minio/mc:latest
    container_name: clipflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        (mc mb -p local/${S3_BUCKET} || true) &&
        mc anonymous set none local/${S3_BUCKET} &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"
    networks:
      - clipflow

  # One-shot migration runner. Builds from packages/db/Dockerfile.migrate
  # (a single-stage node:24.13.0-slim + corepack pnpm + the @clipflow/db
  # workspace package). The CMD runs packages/db/scripts/migrate.mjs
  # which probes for the `users` table to detect schema bootstrap, then
  # either baselines existing migrations (first boot from the dump) or
  # applies them from scratch (truly fresh DB), and finally runs
  # `prisma migrate deploy` so any genuinely-new migration is picked up.
  #
  # `restart: "no"` makes it a true one-shot, mirroring `minio-init`.
  # The api and worker both gate on `service_completed_successfully` so
  # they never start against a half-migrated database.
  migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile.migrate
    container_name: clipflow-migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    restart: "no"
    networks:
      - clipflow

  # The BullMQ worker. Builds from apps/worker/Dockerfile (which installs
  # ffmpeg in the runtime stage) and uses the in-network hostnames so it
  # can reach postgres / redis / minio without publishing host ports.
  #
  # `env_file` supplies the docker-time env. We mount the docker env file
  # explicitly rather than relying on apps/worker/.env so local `pnpm dev`
  # still works without the docker-specific hostnames leaking in.
  #
  # `restart: unless-stopped` so a crashed worker (OOM during FFmpeg) is
  # restarted automatically — important for production-likeness.
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: clipflow-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - clipflow

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: clipflow-web
    ports:
      - "${WEB_PORT}:3000"
    depends_on:
      - api
    env_file:
      - .env
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: clipflow-api
    
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - clipflow

volumes:
  pgdata:
  miniodata:

networks:
  clipflow:
    driver: bridge