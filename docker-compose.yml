# Local-dev infrastructure for ClipFlow.
#
# Brings up everything the API + worker need to run end-to-end:
#   - Postgres 16 (Prisma data store)
#   - Redis 7   (BullMQ queues)
#   - MinIO     (S3-compatible object storage, dev stand-in for R2)
#   - minio-init (creates the videos bucket on first boot)
#
# Usage:
#   docker compose up -d            # start
#   docker compose down -v          # stop + delete volumes (resets state)
#
# The worker runs OUTSIDE compose (via `pnpm --filter worker dev`) for
# faster iteration — a Dockerfile + worker service is a follow-up.

services:
  postgres:
    image: postgres:16-alpine
    container_name: clipflow-postgres
    environment:
      POSTGRES_USER: clipflow
      POSTGRES_PASSWORD: clipflow
      POSTGRES_DB: clipflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipflow -d clipflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: clipflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: clipflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (login minioadmin/minioadmin)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init container: create the videos bucket on first boot.
  # `minio mb` is idempotent when wrapped in `|| true`, so it's safe
  # to re-run via `docker compose up` after `down` without `-v`.
  minio-init:
    image: minio/mc:latest
    container_name: clipflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        (mc mb -p local/clipflow-videos || true) &&
        mc anonymous set none local/clipflow-videos &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

volumes:
  pgdata:
  miniodata: